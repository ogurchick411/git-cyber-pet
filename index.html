<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBot: GitPet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pet-container">
        <h1 id="bot-title">Protocol: DevBot</h1>
        
        <div class="screen">
            <p>Status: <span id="status-text">ONLINE</span></p>
            <p>Battery: <span id="energy-val">100</span>%</p>
            <p>Bugs: <span id="bugs-val">0</span>/100</p>
        </div>

        <div class="buttons">
            <button id="charge-btn">⚡ Charge</button>
            <button id="debug-btn">Fix Bugs</button>
        </div>
    </div>

    <script src="test.js"></script>
</body>
</html>
